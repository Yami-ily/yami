<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  body {
    text-align: center;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  canvas {
    background: #000;
    display: block;
    margin: 20px auto;
    border: 2px solid #fff;
  }
</style>
</head>
<body>

<h1>Snake Game</h1>
<canvas id="game" width="400" height="400"></canvas>
<p>Use arrow keys to move</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake, velocity, nextVelocity, food, score, speed;

function init() {
  snake = [{ x: 10, y: 10 }];
  velocity = { x: 0, y: 0 };
  nextVelocity = { x: 0, y: 0 };
  food = randomFood();
  score = 0;
  speed = 200; // slower start (ms per tick)
}

function randomFood() {
  return {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
}

function gameLoop() {
  update();
  draw();
  setTimeout(gameLoop, speed);
}

function update() {
  // Apply buffered input once per frame
  velocity = nextVelocity;

  const head = {
    x: snake[0].x + velocity.x,
    y: snake[0].y + velocity.y
  };

  // Wall collision
  if (
    head.x < 0 || head.x >= tileCount ||
    head.y < 0 || head.y >= tileCount
  ) {
    init();
    return;
  }

  // Self collision
  for (let part of snake) {
    if (part.x === head.x && part.y === head.y) {
      init();
      return;
    }
  }

  snake.unshift(head);

  // Food collision
  if (head.x === food.x && head.y === food.y) {
    score++;

    // Increase speed gradually (with a cap)
    speed = Math.max(60, speed - 5);

    food = randomFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Snake
  ctx.fillStyle = "lime";
  for (let part of snake) {
    ctx.fillRect(
      part.x * gridSize,
      part.y * gridSize,
      gridSize - 2,
      gridSize - 2
    );
  }

  // Food
  ctx.fillStyle = "red";
  ctx.fillRect(
    food.x * gridSize,
    food.y * gridSize,
    gridSize - 2,
    gridSize - 2
  );

  // Score
  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.fillText("Score: " + score, 10, 20);
}

// Prevent illegal rapid direction changes
document.addEventListener("keydown", e => {
  const key = e.key;

  if (key === "ArrowUp" && velocity.y !== 1) {
    nextVelocity = { x: 0, y: -1 };
  } else if (key === "ArrowDown" && velocity.y !== -1) {
    nextVelocity = { x: 0, y: 1 };
  } else if (key === "ArrowLeft" && velocity.x !== 1) {
    nextVelocity = { x: -1, y: 0 };
  } else if (key === "ArrowRight" && velocity.x !== -1) {
    nextVelocity = { x: 1, y: 0 };
  }
});

init();
gameLoop();
</script>

</body>
</html>
