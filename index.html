<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Pro</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: rgba(255, 255, 255, 0.05);
            --accent-color: #00ffcc;
            --danger-color: #ff3366;
        }

        body {
            text-align: center;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            background: #000;
            display: block;
            border: 2px solid var(--panel-color);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 { margin-top: 0; color: var(--accent-color); text-transform: uppercase; letter-spacing: 3px; }
        
        button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s, background 0.2s;
            margin-top: 15px;
        }

        button:hover {
            background: #00dbaf;
            transform: scale(1.05);
        }

        .stats {
            margin-bottom: 10px;
            font-size: 1.1rem;
            display: flex;
            gap: 20px;
            color: #aaa;
        }

        .stats b { color: #fff; }
        
        .hidden { display: none !important; }

        kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Neon Snake</h1>

    <div class="stats">
        <span>Score: <b id="scoreVal">0</b></span>
        <span>Speed: <b id="speedVal">1</b></span>
    </div>

    <div class="game-container">
        <!-- Start Screen -->
        <div id="startScreen" class="overlay">
            <h2>READY?</h2>
            <p>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> to move</p>
            <p>Press <kbd>P</kbd> to Pause</p>
            <button onclick="startGame()">START GAME</button>
        </div>

        <!-- Pause Screen -->
        <div id="pauseScreen" class="overlay hidden">
            <h2 style="color: #ffcc00;">PAUSED</h2>
            <button onclick="togglePause()">RESUME</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="overlay hidden">
            <h2 style="color: var(--danger-color);">GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="startGame()">TRY AGAIN</button>
        </div>

        <canvas id="game" width="400" height="400"></canvas>
    </div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("scoreVal");
    const speedEl = document.getElementById("speedVal");
    const finalScoreEl = document.getElementById("finalScore");

    // Screens
    const startScreen = document.getElementById("startScreen");
    const pauseScreen = document.getElementById("pauseScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake, velocity, nextVelocity, food, score, msPerTick, lastTickTime, gameState;

    // Game States: 'START', 'PLAYING', 'PAUSED', 'GAMEOVER'
    gameState = 'START';

    function init() {
        snake = [{ x: 10, y: 10 }];
        velocity = { x: 0, y: 0 };
        nextVelocity = { x: 0, y: 0 };
        food = randomFood();
        score = 0;
        msPerTick = 250; // Very slow start
        scoreEl.innerText = "0";
        speedEl.innerText = "1";
    }

    function randomFood() {
        let newFood;
        while (true) {
            newFood = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Ensure food doesn't spawn on snake body
            let collision = snake.some(part => part.x === newFood.x && part.y === newFood.y);
            if (!collision) return newFood;
        }
    }

    function startGame() {
        init();
        gameState = 'PLAYING';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        lastTickTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function togglePause() {
        if (gameState === 'PLAYING') {
            gameState = 'PAUSED';
            pauseScreen.classList.remove('hidden');
        } else if (gameState === 'PAUSED') {
            gameState = 'PLAYING';
            pauseScreen.classList.add('hidden');
            lastTickTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        finalScoreEl.innerText = score;
        gameOverScreen.classList.remove('hidden');
    }

    function gameLoop(currentTime) {
        if (gameState !== 'PLAYING') return;

        requestAnimationFrame(gameLoop);

        const delta = currentTime - lastTickTime;
        if (delta < msPerTick) return;

        lastTickTime = currentTime;
        update();
        draw();
    }

    function update() {
        // Prevent moving if no direction pressed yet
        if (nextVelocity.x === 0 && nextVelocity.y === 0) return;

        velocity = nextVelocity;
        const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

        // Wall collision
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            gameOver();
            return;
        }

        // Self collision
        if (snake.some(part => part.x === head.x && part.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);

        // Food collision
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.innerText = score;
            
            // Progression: Speed up every point, cap at 60ms
            // Starting at 250ms, decreases by 8ms per food
            msPerTick = Math.max(60, 250 - (score * 8));
            
            // Visual speed indicator (1-10)
            speedEl.innerText = Math.floor((250 - msPerTick) / 20) + 1;
            
            food = randomFood();
        } else {
            snake.pop();
        }
    }

    function draw() {
        // Clear background
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw subtle grid
        ctx.strokeStyle = "#111";
        for(let i=0; i<canvas.width; i+=gridSize) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Food (Glow effect)
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff3366";
        ctx.fillStyle = "#ff3366";
        ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

        // Snake
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00ffcc";
        snake.forEach((part, index) => {
            // Head is a different color
            ctx.fillStyle = (index === 0) ? "#fff" : "#00ffcc";
            ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
        });
        
        // Reset shadow for next draw
        ctx.shadowBlur = 0;
    }

    window.addEventListener("keydown", e => {
        const key = e.key;

        // Pause control
        if (key.toLowerCase() === 'p') {
            togglePause();
            return;
        }

        // Direction controls
        if (key === "ArrowUp" && velocity.y !== 1) nextVelocity = { x: 0, y: -1 };
        else if (key === "ArrowDown" && velocity.y !== -1) nextVelocity = { x: 0, y: 1 };
        else if (key === "ArrowLeft" && velocity.x !== 1) nextVelocity = { x: -1, y: 0 };
        else if (key === "ArrowRight" && velocity.x !== -1) nextVelocity = { x: 1, y: 0 };
    });

    // Initial draw to show the empty board
    draw();
</script>

</body>
</html>
